services:
  # ── Python FastAPI backend ───────────────────────────────────────────────────
  - type: web
    name: crypto-wallet-api
    runtime: docker
    dockerfilePath: artifacts/python-api/Dockerfile
    dockerContext: artifacts/python-api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crypto-wallet-db
          property: connectionString
      - key: PORT
        value: 8000

  # ── React frontend (static site) ────────────────────────────────────────────
  - type: web
    name: crypto-wallet-frontend
    runtime: static
    buildCommand: npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/crypto-wallet run build
    staticPublishPath: artifacts/crypto-wallet/dist/public
    envVars:
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 3000
      # Set this to your deployed API URL, e.g. https://crypto-wallet-api.onrender.com
      # Leave blank to use the relative /api path (only works when frontend + API share the same domain)
      - key: VITE_API_URL
        value: ""

databases:
  - name: crypto-wallet-db
    databaseName: wallet
    user: wallet
