services:
  # Single Docker service — Python serves both the API and the React frontend
  - type: web
    name: crypto-wallet
    runtime: docker
    # Render picks up ./Dockerfile at repo root automatically
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crypto-wallet-db
          property: connectionString
      - key: PORT
        value: 8000

databases:
  - name: crypto-wallet-db
    databaseName: wallet
    user: wallet
